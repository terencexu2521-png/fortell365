<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵感命理 - AI驱动的现代命理顾问</title>
<meta name="description" content="AI驱动的现代命理顾问，为您提供专业的紫微斗数、八字命理、塔罗占卜等服务">
<meta name="keywords" content="命理,占卜,紫微斗数,八字,塔罗,AI命理">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React and ReactDOM from CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel for JSX transformation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
.gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.card-shadow { box-shadow: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
.mystical-glow { box-shadow: 0 0 20px rgba(147, 51, 234, 0.3); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// 简单的前端界面
function App() {
const [currentPage, setCurrentPage] = useState('home');
const [userInfo, setUserInfo] = useState({
name: '',
birthDate: '',
birthTime: '',
gender: ''
});
const [divinationType, setDivinationType] = useState('');

const handleInputChange = (field, value) => {
setUserInfo(prev => ({...prev, [field]: value}));
};

const handleGenerate = () => {
// 模拟生成过程
alert('报告生成中，请稍候...');
setCurrentPage('result');
};

const renderHomePage = () => (
<div className="min-h-screen gradient-bg">
<div className="container mx-auto px-4 py-8">
{/* Header */}
<header className="text-center mb-12">
<h1 className="text-5xl font-bold text-white mb-4">
灵感命理
</h1>
<p className="text-xl text-purple-100">
AI驱动的现代命理顾问
</p>
</header>

{/* Services */}
<div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
{[
{ name: '紫微斗数', desc: '探索您的星盘命理', icon: '⭐' },
{ name: '八字命理', desc: '解析您的生辰八字', icon: '📅' },
{ name: '塔罗占卜', desc: '洞察您的内心世界', icon: '🔮' },
{ name: '九宫命理', desc: '揭示您的命运格局', icon: '🎯' }
].map((service, index) => (
<div key={index} 
className="bg-white/10 backdrop-blur-sm rounded-lg p-6 text-center card-shadow hover:mystical-glow transition-all cursor-pointer"
onClick={() => {setDivinationType(service.name); setCurrentPage('generate');}}>
<div className="text-4xl mb-4">{service.icon}</div>
<h3 className="text-xl font-semibold text-white mb-2">{service.name}</h3>
<p className="text-purple-100">{service.desc}</p>
</div>
))}
</div>

{/* CTA */}
<div className="text-center">
<button 
onClick={() => setCurrentPage('generate')}
className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-4 rounded-full text-lg font-semibold hover:from-purple-600 hover:to-pink-600 transition-all card-shadow">
开始命理分析
</button>
</div>
</div>
</div>
);

const renderGeneratePage = () => (
<div className="min-h-screen bg-gray-50">
<div className="container mx-auto px-4 py-8">
<div className="max-w-2xl mx-auto bg-white rounded-lg p-8 card-shadow">
<h2 className="text-3xl font-bold text-center mb-8">开始您的{divinationType}分析</h2>

<div className="space-y-6">
<div>
<label className="block text-sm font-medium text-gray-700 mb-2">姓名</label>
<input 
type="text" 
className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
value={userInfo.name}
onChange={(e) => handleInputChange('name', e.target.value)}
placeholder="请输入您的姓名"
/>
</div>

<div>
<label className="block text-sm font-medium text-gray-700 mb-2">出生日期</label>
<input 
type="date" 
className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
value={userInfo.birthDate}
onChange={(e) => handleInputChange('birthDate', e.target.value)}
/>
</div>

<div>
<label className="block text-sm font-medium text-gray-700 mb-2">出生时间</label>
<input 
type="time" 
className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
value={userInfo.birthTime}
onChange={(e) => handleInputChange('birthTime', e.target.value)}
/>
</div>

<div>
<label className="block text-sm font-medium text-gray-700 mb-2">性别</label>
<select 
className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
value={userInfo.gender}
onChange={(e) => handleInputChange('gender', e.target.value)}
>
<option value="">请选择</option>
<option value="男">男</option>
<option value="女">女</option>
</select>
</div>

<div className="pt-4">
<button 
onClick={handleGenerate}
className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-lg font-semibold hover:from-purple-600 hover:to-pink-600 transition-all"
>
生成命理报告
</button>
</div>
</div>
</div>
</div>
</div>
);

const renderResultPage = () => (
<div className="min-h-screen bg-gray-50">
<div className="container mx-auto px-4 py-8">
<div className="max-w-4xl mx-auto">
{/* 结果页面内容 */}
<div className="bg-white rounded-lg p-8 card-shadow">
<h2 className="text-3xl font-bold text-center mb-8">您的{divinationType}报告</h2>

<div className="space-y-6">
<div className="bg-purple-50 p-6 rounded-lg">
<h3 className="text-xl font-semibold text-purple-800 mb-4">总体命理趋势概览</h3>
<p className="text-gray-700">
基于您提供的信息，您的人生运势整体呈现上升趋势。在接下来的时间里，您将迎来重要的机遇期。
</p>
</div>

<div className="bg-amber-50 p-6 rounded-lg">
<h3 className="text-xl font-semibold text-amber-800 mb-4">核心建议</h3>
<ul className="text-gray-700 space-y-2">
<li>• 保持积极的心态，相信自己的能力</li>
<li>• 在重要决策时多方征求意见</li>
<li>• 注意身体健康，平衡工作与生活</li>
</ul>
</div>

<div className="text-center pt-6">
<button className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-3 rounded-full font-semibold hover:from-purple-600 hover:to-pink-600 transition-all">
解锁完整报告 (¥9.9)
</button>
<p className="text-sm text-gray-500 mt-2">
查看详细的命理分析和个性化建议
</p>
</div>
</div>
</div>

<div className="text-center mt-8">
<button 
onClick={() => setCurrentPage('home')}
className="text-purple-600 hover:text-purple-800"
>
← 返回首页
</button>
</div>
</div>
</div>
</div>
);

const renderPage = () => {
switch(currentPage) {
case 'generate': return renderGeneratePage();
case 'result': return renderResultPage();
default: return renderHomePage();
}
};

return renderPage();
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
